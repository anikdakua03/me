name: Deploy Admin to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'projects/me-admin/**'
      - 'projects/shared/**'
      - '.github/workflows/deploy-admin.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared library
        run: npx ng build shared --configuration production

      - name: Build admin app
        run: |
          npx ng build me-admin \
            --configuration production \
            --base-href /
        # Hash routing handles all routes, base-href is just /

      - name: Create Firebase config from secrets
        run: |
          echo '{
            "projects": {
              "default": "${{ secrets.FIREBASE_PROJECT_ID }}"
            }
          }' > .firebaserc

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
        # Deploys to Firebase Hosting production channel
        # URL will be: https://PROJECT_ID.web.app or custom domain